openapi: 3.0.3
info:
  title: Book App API
  description: |
    A serverless CRUD API for managing books.

    ## Authentication
    All write operations (POST, PUT, DELETE) require a valid Cognito JWT token.
    Pass the `IdToken` obtained from Cognito in the `Authorization` header (no `Bearer` prefix).

    Read operations (GET) are public and do not require authentication.

    ## Getting a token
    ```bash
    make login
    ```
  version: "1.0.0"

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/v1
    description: AWS API Gateway
    variables:
      apiId:
        default: your-api-id
        description: API Gateway ID from CloudFormation outputs
      region:
        default: us-east-1
        description: AWS region

security: []

paths:
  /books:
    post:
      summary: Create a book
      description: Creates a new book. Requires admin JWT token.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookCreate"
            example:
              isbn: "978-0-06-112008-4"
              name: "To Kill a Mockingbird"
              authors: ["Harper Lee"]
              languages: ["EN"]
              countries: ["US"]
              numberOfPages: 281
              releaseDate: "1960-07-11"
      responses:
        "201":
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      summary: Query books
      description: |
        Returns books matching the given filters. Public endpoint.

        **Filter logic:**
        - Multiple values on the same field use OR: `?languages=EN,FR` → books with EN or FR
        - Values across different fields use AND: `?languages=EN&countries=US` → EN language AND US country
      parameters:
        - name: isbn
          in: query
          schema:
            type: string
          example: "978-0-06-112008-4"
        - name: name
          in: query
          schema:
            type: string
          example: "Mockingbird"
        - name: authors
          in: query
          description: Matches books where the value appears in the authors list. Supports comma-separated OR values.
          schema:
            type: string
          example: "Harper Lee"
        - name: languages
          in: query
          description: ISO 639-1 code. Supports comma-separated OR values (e.g. EN,FR).
          schema:
            type: string
          example: "EN"
        - name: countries
          in: query
          description: ISO 3166-1 alpha-2 code. Supports comma-separated OR values (e.g. US,GB).
          schema:
            type: string
          example: "US"
        - name: releaseDate
          in: query
          description: Exact date match in ISO 8601 format.
          schema:
            type: string
            format: date
          example: "1960-07-11"
        - name: limit
          in: query
          description: Maximum number of items to return per page (default 50).
          schema:
            type: integer
            default: 50
        - name: nextToken
          in: query
          description: Pagination token returned from a previous response.
          schema:
            type: string
      responses:
        "200":
          description: List of matching books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

  /books/batch:
    post:
      summary: Create multiple books
      description: |
        Creates up to 10 books in a single request. Requires admin JWT token.

        Books are processed sequentially. Partial success is possible — each book
        is attempted independently. Returns `201` if all succeeded, `207 Multi-Status`
        if any failed.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookBatchCreate"
            example:
              books:
                - isbn: "978-0-06-112008-4"
                  name: "To Kill a Mockingbird"
                  authors: ["Harper Lee"]
                  languages: ["EN"]
                  countries: ["US"]
                  numberOfPages: 281
                  releaseDate: "1960-07-11"
                - isbn: "978-0-7432-7356-5"
                  name: "1984"
                  authors: ["George Orwell"]
                  languages: ["EN"]
                  countries: ["GB"]
                  numberOfPages: 328
                  releaseDate: "1949-06-08"
      responses:
        "201":
          description: All books created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookBatchResponse"
        "207":
          description: Partial success — some books created, some failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookBatchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /books/{isbn}:
    parameters:
      - name: isbn
        in: path
        required: true
        schema:
          type: string
        example: "978-0-06-112008-4"

    get:
      summary: Get a book by ISBN
      description: Returns a single book by ISBN. Public endpoint.
      responses:
        "200":
          description: Book found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update a book
      description: |
        Partially updates a book. Only fields present in the request body are updated.
        The `isbn` field is ignored even if provided — it cannot be changed.
        Unknown fields are rejected with 422. Requires admin JWT token.
      security:
        - CognitoAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookUpdate"
            example:
              numberOfPages: 300
      responses:
        "200":
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      summary: Delete a book
      description: Deletes a book by ISBN. Requires admin JWT token.
      security:
        - CognitoAuth: []
      responses:
        "204":
          description: Book deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    CognitoAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cognito IdToken obtained via `make login`.
        Pass directly in the Authorization header — no "Bearer" prefix required.

  schemas:
    BookCreate:
      type: object
      required:
        - isbn
        - name
        - authors
        - languages
        - countries
        - numberOfPages
        - releaseDate
      properties:
        isbn:
          type: string
          description: International Standard Book Number (10 or 13 digits).
          example: "978-0-06-112008-4"
        name:
          type: string
          example: "To Kill a Mockingbird"
        authors:
          type: array
          items:
            type: string
          minItems: 1
          example: ["Harper Lee"]
        languages:
          type: array
          items:
            type: string
          minItems: 1
          description: ISO 639-1 language codes. Normalised to uppercase on ingestion.
          example: ["EN"]
        countries:
          type: array
          items:
            type: string
          minItems: 1
          description: ISO 3166-1 alpha-2 country codes. Normalised to uppercase on ingestion.
          example: ["US"]
        numberOfPages:
          type: integer
          minimum: 1
          example: 281
        releaseDate:
          type: string
          format: date
          description: ISO 8601 date format (YYYY-MM-DD).
          example: "1960-07-11"

    BookBatchCreate:
      type: object
      required:
        - books
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/BookCreate"
          minItems: 1
          maxItems: 10
          description: List of books to create. Maximum 10 per request.

    BookUpdate:
      type: object
      description: All fields optional. isbn is ignored if provided. Unknown fields are rejected.
      properties:
        name:
          type: string
        authors:
          type: array
          items:
            type: string
          minItems: 1
        languages:
          type: array
          items:
            type: string
          minItems: 1
        countries:
          type: array
          items:
            type: string
          minItems: 1
        numberOfPages:
          type: integer
          minimum: 1
        releaseDate:
          type: string
          format: date
          description: ISO 8601 date format (YYYY-MM-DD).

    BookResponse:
      allOf:
        - $ref: "#/components/schemas/BookCreate"
        - type: object
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    BookListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BookResponse"
        count:
          type: integer
          example: 2
        nextToken:
          type: string
          nullable: true
          description: Pass as nextToken query param to retrieve the next page.

    BookBatchResponse:
      type: object
      properties:
        created:
          type: array
          items:
            $ref: "#/components/schemas/BookResponse"
          description: Successfully created books.
        failed:
          type: array
          items:
            type: object
            properties:
              isbn:
                type: string
              reason:
                type: string
          description: Books that failed to be created with their reasons.

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "BOOK_NOT_FOUND"
            message:
              type: string
              example: "Book with ISBN '978-x-xx-xxxxxx-x' not found."
            requestId:
              type: string

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "numberOfPages must be a positive integer."
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "releaseDate must be in ISO 8601 format: YYYY-MM-DD."
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Missing or invalid authorization token."
    Forbidden:
      description: Authenticated user does not have permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "FORBIDDEN"
              message: "You do not have permission to perform this action."
    NotFound:
      description: Book not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "BOOK_NOT_FOUND"
              message: "Book with ISBN '978-0-06-112008-4' not found."
    Conflict:
      description: Book with this ISBN already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "ISBN_CONFLICT"
              message: "A book with ISBN '978-0-06-112008-4' already exists."
